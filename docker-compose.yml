services:
  postgres-db:
    image: postgres:15
    container_name: postgres-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  spring-app:
    build: .
    container_name: spring-app
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    # Дополнительная задержка для надёжности
    command: >
      sh -c "
        java -jar /app/backend.jar
      "

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
